<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store</title>

    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="/img/piza.png" alt="Logo Food Store">
            <h1>Food Store</h1>
        </div>
        <nav>
            <ul>
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/src/pages/client/carrito.html">Carrito</a></li>
                <li><a href="/src/pages/client/pedidos.html">Mis pedidos</a></li>
                <li><a href="/src/pages/auth/login.html">Login</a></li>
                <li><a href="/src/pages/auth/registro.html">Registrarse</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <aside>
            <h2>Categorías</h2>
            <ul
                id="listaCategorias"
                class="lista-categorias">
            </ul>
        </aside>
        <section>
            <h2>Productos</h2>

            <form id="formBusqueda">
                <input
                    type="search"
                    id="busqueda"
                    placeholder="Buscar producto...">
                <button type="submit">
                    Buscar
                </button>
            </form>
            <section
                id="listaProductos"
                class="productos">
            </section>
        </section>
    </main>
    <footer>
        <p>© Food Store</p>
    </footer>

    
    <script type="module" src="/src/main.ts"></script>

</body>
</html>
