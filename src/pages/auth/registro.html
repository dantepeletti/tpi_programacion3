<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
</head>
<body>
    <header>
        <h1>Registro</h1>
        <nav>
            <a href="/index.html">Inicio</a>
            <a href="/src/pages/auth/login.html">Login</a>
        </nav>
    </header>

    <main>
        <h1>Crear cuenta</h1>
        <form id="form-registro">
            <div>
                <label for="nombre">Nombre</label>
                <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    required
                >
            </div>
            <div>
                <label for="apellido">Apellido</label>
                <input
                    type="text"
                    id="apellido"
                    name="apellido"
                    required
                >
            </div>
            <div>
                <label for="celular">Celular</label>
                <input
                    type="text"
                    id="celular"
                    name="celular"
                    required
                >
            </div>
            <div>
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                >
            </div>
            <div>
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                >
            </div>
            <button type="submit">
                Registrarse
            </button>
        </form>
        <p>
            ¿Ya tienes cuenta?
            <a href="./login.html">
                Iniciar sesión
            </a>
        </p>
    </main>
    
    <script type="module" src="./registro.ts"></script>
</body>
</html>
