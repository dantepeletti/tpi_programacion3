<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <main>
        <form id="form-login">
            <div>
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                >
            </div>
            <div>
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                >
            </div>
            <button type="submit">
                Iniciar sesión
            </button>
            <p>
                ¿No tienes cuenta?
                <a href="./registro.html">
                    Registrarse
                </a>
            </p>
        </form>
    </main>

    <script type="module" src="./login.ts"></script>
</body>
</html>
