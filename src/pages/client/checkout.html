<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Food Store</title>

    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>

    <header>
        <h1>Finalizar compra</h1>
    </header>

    <main>

        <section>

            <h2>Resumen del pedido</h2>

            <div id="detallePedido"></div>

        </section>

        <section>

            <h2>Forma de pago</h2>

            <select id="formaPago">

                <option value="EFECTIVO">
                    Efectivo
                </option>

                <option value="TARJETA">
                    Tarjeta
                </option>

                <option value="TRANSFERENCIA">
                    Transferencia
                </option>

            </select>

        </section>

        <section>

            <button id="btnConfirmar">
                Confirmar compra
            </button>

            <a href="/src/pages/client/carrito.html">
                Volver al carrito
            </a>

        </section>

    </main>

    <script
        type="module"
        src="./checkout.ts">
    </script>

</body>
</html>
