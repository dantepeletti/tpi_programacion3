<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Food Store</title>
    <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body>
    <main class="checkout">

        <h1>Confirmar compra</h1>

        <section id="detallePedido">

        </section>

        <form id="formCheckout">

            <label for="formaPago">
                Forma de pago
            </label>

            <select
                id="formaPago"
                required>

                <option value="">
                    Seleccione una opción
                </option>

                <option value="EFECTIVO">
                    Efectivo
                </option>

                <option value="TARJETA">
                    Tarjeta
                </option>

                <option value="TRANSFERENCIA">
                    Transferencia
                </option>

            </select>

            <button type="submit">
                Confirmar compra
            </button>

        </form>

    </main>
    <script
        type="module"
        src="./checkout.ts">
    </script>
</body>
</html>
